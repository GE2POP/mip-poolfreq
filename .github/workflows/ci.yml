name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gfreq-package-check:
    name: Gfreq package check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libicu-dev

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("pak", "devtools"), repos="https://cloud.r-project.org")'
          Rscript -e 'pak::local_install_deps("Gfreq", dependencies = TRUE)'

      - name: Build and check Gfreq
        run: |
          cd Gfreq
          rm -f Gfreq_*.tar.gz
          Rscript -e 'devtools::document()'
          R CMD build .
          R CMD check --no-manual Gfreq_*.tar.gz
          rm -f Gfreq_*.tar.gz

  build-container:
    name: Build container image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t mip-poolfreq .

      - name: Check container help
        run: |
          docker run --rm mip-poolfreq --help
          docker run --rm mip-poolfreq Afreq --help
          docker run --rm mip-poolfreq Afreq estimate --help
          docker run --rm mip-poolfreq Gfreq --help
          docker run --rm mip-poolfreq Gfreq estimate --help

      - name: Save Docker image
        run: |
          docker save mip-poolfreq:latest -o mip-poolfreq.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: mip-poolfreq-image
          path: mip-poolfreq.tar
          retention-days: 1
          compression-level: 0

  docker-tests:
    name: Docker tests
    runs-on: ubuntu-latest
    needs: build-container

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: mip-poolfreq-image

      - name: Load Docker image
        run: |
          docker load -i mip-poolfreq.tar

      - name: Test Afreq in Docker image
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            mip-poolfreq \
            bash ./dev/Afreq/test.sh

      - name: Test Gfreq in Docker image
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            mip-poolfreq \
            bash ./dev/Gfreq/test.sh

  apptainer-tests:
    name: Apptainer tests
    runs-on: ubuntu-latest
    needs: build-container

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apptainer
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Prepare Apptainer cache and tmp
        run: |
          mkdir -p "$RUNNER_TEMP/apptainer-cache" "$RUNNER_TEMP/apptainer-tmp"
          echo "APPTAINER_CACHEDIR=$RUNNER_TEMP/apptainer-cache" >> "$GITHUB_ENV"
          echo "APPTAINER_TMPDIR=$RUNNER_TEMP/apptainer-tmp" >> "$GITHUB_ENV"

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: mip-poolfreq-image

      - name: Build Apptainer image from Docker archive
        run: |
          apptainer build --force mip-poolfreq.sif docker-archive:mip-poolfreq.tar

      - name: Test Afreq in Apptainer image
        run: |
          apptainer exec --cleanenv \
            --bind "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            "$GITHUB_WORKSPACE/mip-poolfreq.sif" \
            bash "$GITHUB_WORKSPACE/dev/Afreq/test.sh"

      - name: Test Gfreq in Apptainer image
        run: |
          apptainer exec --cleanenv \
            --bind "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            "$GITHUB_WORKSPACE/mip-poolfreq.sif" \
            bash "$GITHUB_WORKSPACE/dev/Gfreq/test.sh"
